name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild build \
            -project diregenta-ui.xcodeproj \
            -scheme diregenta-ui \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Test
        run: |
          xcodebuild test \
            -project diregenta-ui.xcodeproj \
            -scheme diregenta-ui \
            -destination 'platform=macOS' \
            -skip-testing:diregenta-uiTests/MDNSDiscoveryTests/testDiscoverHubOnLocalNetwork \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
