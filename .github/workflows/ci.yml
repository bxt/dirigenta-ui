name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project dirigenta-ui.xcodeproj \
            -scheme dirigenta-ui \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Unlock keychain for tests
        run: |
          # Allow unsigned test binaries to access the login Keychain without
          # prompting (headless CI runners block interactive auth dialogs).
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 ~/Library/Keychains/login.keychain-db

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project dirigenta-ui.xcodeproj \
            -scheme dirigenta-ui \
            -destination 'platform=macOS' \
            -skip-testing:dirigenta-uiTests/MDNSDiscoveryTests/testDiscoverHubOnLocalNetwork \
            -parallel-testing-enabled NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
