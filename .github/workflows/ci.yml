name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project dirigenta-ui.xcodeproj \
            -scheme dirigenta-ui \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Unlock keychain for tests
        run: |
          # Allow unsigned test binaries to access the login Keychain without
          # prompting (headless CI runners block interactive auth dialogs).
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 ~/Library/Keychains/login.keychain-db

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project dirigenta-ui.xcodeproj \
            -scheme dirigenta-ui \
            -destination 'platform=macOS,arch=arm64' \
            -skip-testing:dirigenta-uiTests/MDNSDiscoveryTests/testDiscoverHubOnLocalNetwork \
            -skip-testing:dirigenta-uiTests/AppStateCredentialInitTests/testInit_emptyToken_whenStoreEmpty \
            -skip-testing:dirigenta-uiTests/AppStateCredentialInitTests/testInit_gracefullyHandlesMalformedJSON \
            -skip-testing:dirigenta-uiTests/AppStateCredentialInitTests/testInit_readsAccessTokenFromStore \
            -skip-testing:dirigenta-uiTests/AppStateCredentialInitTests/testInit_readsFingerprintFromStore \
            -skip-testing:dirigenta-uiTests/AppStateMakeClientTests/testMakeClient_afterIPChange_newCallWithOldIPCreatesNewInstance \
            -skip-testing:dirigenta-uiTests/AppStateMakeClientTests/testMakeClient_differentIP_returnsDifferentInstance \
            -skip-testing:dirigenta-uiTests/AppStateMakeClientTests/testMakeClient_usesCurrentAccessToken \
            -skip-testing:dirigenta-uiTests/MDNSDiscoveryTests/testStartIsIdempotent \
            -skip-testing:dirigenta-uiTests/MDNSDiscoveryTests/testStartSetsIsResolving \
            -skip-testing:dirigenta-uiTests/MDNSDiscoveryTests/testStopClearsState \
            -skip-testing:dirigenta-uiTests/MDNSDiscoveryTests/testRetryResetsAndRestarts \
            -skip-testing:dirigenta-uiTests/MDNSResolverStopGuardTests/testStopThenStart_allowsSecondStart \
            -skip-testing:dirigenta-uiTests/MDNSResolverStopGuardTests/testStop_isIdempotent \
            -skip-testing:dirigenta-uiTests/MDNSResolverStopGuardTests/testStop_withoutStart_doesNotCrash \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: build/reports/tests.html
          archive: false
