name: Release

# Triggered by pushing a version tag, e.g. git tag v1.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write      # required to create GitHub releases
  id-token: write      # required for OIDC token used by attestation
  attestations: write  # required to persist build provenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      # Strip the leading 'v' from the tag so MARKETING_VERSION is "1.2.0".
      - name: Derive version from tag
        run: echo "MARKETING_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          xcodebuild build \
            -project dirigenta-ui.xcodeproj \
            -scheme dirigenta-ui \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create release ZIP
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData" -name "dirigenta-ui.app" -maxdepth 6 | head -1)
          ditto -c -k --keepParent "$APP" "dirigenta-ui-${GITHUB_REF_NAME}.zip"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dirigenta-ui-${{ github.ref_name }}.zip"

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dirigenta-ui-${GITHUB_REF_NAME}.zip" \
            --title "dirigenta-ui ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-version:refname | sed -n '2p')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
